version: '3.8'
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - ./data:/app/data
    environment:
      - NODE_ENV=development

  scraper:
    build: ./scraper
    volumes:
      - ./scraper:/app
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
