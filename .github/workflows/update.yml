name: Update Skills Data

on:
  schedule:
    # 每6小时更新一次
    - cron: '0 */6 * * *'
  workflow_dispatch: # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          
      - name: Run scraper
        run: |
          python3 scraper/scraper.py
          
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/skills.json frontend/data/skills.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update skills data [skip ci]"
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Trigger rebuild
        run: |
          curl -X POST https://api.github.com/repos/${{ github.repository }}/pages/builds \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"
